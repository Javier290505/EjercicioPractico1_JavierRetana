<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Categorías | Salón Belleza')"></head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<main class="container">
  <section class="section">
    <div class="section-head">
      <h2>Gestión de Categorías</h2>
      <a class="btn" th:href="@{/categorias/nueva}">Nueva Categoría</a>
    </div>

    <div class="card">
      <table class="table">
        <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${categorias}">
          <td th:text="${c.id}">1</td>
          <td th:text="${c.nombre}">Cabello</td>
          <td class="actions">
            <a class="btn btn-sm" th:href="@{/categorias/editar/{id}(id=${c.id})}">Editar</a>
            <a class="btn btn-sm btn-danger" th:href="@{/categorias/eliminar/{id}(id=${c.id})}"
               onclick="return confirm('¿Eliminar categoría?')">Eliminar</a>
          </td>
        </tr>

        <tr th:if="${#lists.isEmpty(categorias)}">
          <td colspan="3" class="muted">No hay categorías registradas.</td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
