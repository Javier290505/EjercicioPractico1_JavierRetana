<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('Formulario Servicio | Salón Belleza')"></head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<main class="container">
  <section class="section">
    <div class="section-head">
      <h2 th:text="${servicio.id == null ? 'Nuevo Servicio' : 'Editar Servicio'}"></h2>
      <a class="btn btn-outline" th:href="@{/servicios}">Volver</a>
    </div>

    <div class="card">
      <form th:action="@{/servicios/guardar}" method="post" th:object="${servicio}">
        <input type="hidden" th:field="*{id}">

        <div class="form-row">
          <label>Nombre</label>
          <input type="text" th:field="*{nombre}" placeholder="Ej: Pedicure Spa" required>
        </div>

        <div class="form-row">
          <label>Precio</label>
          <input type="number" step="0.01" th:field="*{precio}" required>
        </div>

        <div class="form-row">
          <label>Categoría</label>
          <select name="categoriaId" required>
            <option value="">-- Seleccione --</option>
            <option th:each="c : ${categorias}"
                    th:value="${c.id}"
                    th:text="${c.nombre}"
                    th:selected="${categoriaId != null and c.id == categoriaId}">
            </option>
          </select>
        </div>

        <button class="btn" type="submit">Guardar</button>
      </form>
    </div>
  </section>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
